<app-header></app-header>
<canvas id="bg-canvas"></canvas>
<main>
  <router-outlet></router-outlet>
</main>
<app-footer></app-footer>

<!-- ── Floating Side Bar ─────────────────────────────────── -->
<div class="side-bar" id="side-bar">
  <div class="side-bar-inner">
    <button
      class="side-toggle"
      (click)="toggleSideBar()"
      [title]="sideBarOpen ? 'Collapse' : 'Expand'"
      aria-label="Toggle sidebar">
      <i class="bi" [ngClass]="sideBarOpen ? 'bi-chevron-left' : 'bi-chevron-right'"></i>
    </button>

    @if (sideBarOpen) {
    <div class="side-icons-container">
      <!-- Theme toggle -->
      <label class="side-bar-icon theme-switch" for="theme-checkbox"
        [matTooltip]="themeSwitch.value ? 'Switch to Light' : 'Switch to Dark'" matTooltipPosition="above">
        <input type="checkbox" id="theme-checkbox" [formControl]="themeSwitch" (change)="toggleTheme()" />
        <i class="bi" [ngClass]="themeSwitch.value ? 'bi-moon-fill' : 'bi-brightness-high'"></i>
      </label>

      <a href="https://www.linkedin.com/in/joshua-t-j-68121b22a/" target="_blank" matTooltip="LinkedIn" matTooltipPosition="above">
        <div class="side-bar-icon"><i class="bi bi-linkedin"></i></div>
      </a>
      <a href="https://github.com/Joshua-T-J" target="_blank" matTooltip="GitHub" matTooltipPosition="above">
        <div class="side-bar-icon"><i class="bi bi-github"></i></div>
      </a>
      <a href="https://www.instagram.com/joshua.t_j/" target="_blank" matTooltip="Instagram" matTooltipPosition="above">
        <div class="side-bar-icon"><i class="bi bi-instagram"></i></div>
      </a>
      <a href="mailto:joshuajose312@gmail.com" matTooltip="Email" matTooltipPosition="above">
        <div class="side-bar-icon"><i class="bi bi-envelope"></i></div>
      </a>
    </div>
    }
  </div>
</div>

<!-- ── Scroll-to-top ─────────────────────────────────────── -->
<div
  class="up-arrow"
  id="goto-top"
  (click)="scrollToTop()"
  matTooltip="Go to Top"
  role="button"
  aria-label="Scroll to top">
  <a id="progress-value"><i class="bi bi-arrow-up"></i></a>
</div>
